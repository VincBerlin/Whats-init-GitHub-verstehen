name: Trending Jobs (Manual Only)

# PHASE-5 — manual snapshot + weekly ranking jobs (API-005 / API-006).
# Requires repository secrets: APP_URL (e.g. https://whatsinit.app), CRON_SECRET.
# No OpenRouter is ever called by these jobs (FR-018).
# Automatic daily and weekly repository discovery is intentionally disabled.

on:
  workflow_dispatch:

jobs:
  daily-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Update daily discovery (Daily Top + Niche, snapshots)
        run: |
          curl -fsS -X POST "$APP_URL/api/jobs/update-daily-discovery" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" -d '{}'
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Update trending snapshots
        run: |
          curl -fsS -X POST "$APP_URL/api/jobs/update-trending-snapshots" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" -d '{}'
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  weekly:
    runs-on: ubuntu-latest
    needs: snapshots
    steps:
      - name: Update weekly trending
        run: |
          curl -fsS -X POST "$APP_URL/api/jobs/update-weekly-trending" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" -d '{}'
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
